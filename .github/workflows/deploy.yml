name: Deploy to GitHub Pages

# 1. The Trigger: Tell the robot to run whenever you push to the 'main' branch
on:
  push:
    branches:
      - main

# 2. Permissions: Give the robot security clearance to push code to your repo
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest # 3. The robot borrows a temporary Linux computer
    
    steps:
      # 4. Download your code from the main branch
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 5. Install Node.js on the temporary computer
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 6. Install your package dependencies
      - name: Install Dependencies
        run: npm install

      # 7. Run the specific build script we made for GitHub (with the base path!)
      - name: Build Project
        run: npm run predeploy

      # 8. Push the finished 'dist' folder to the 'gh-pages' branch
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist